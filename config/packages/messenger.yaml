framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: 'doctrine://default?queue_name=wled'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            failed: 'doctrine://default?queue_name=failed'

        routing:
            'App\Message\WledHighlightMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
